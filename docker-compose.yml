services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      /bin/sh -c "
      until ollama list >/dev/null 2>&1; do
        echo 'Esperando Ollama...';
        sleep 2;
      done;
      ollama pull qwen2.5-coder:7b &&
      ollama pull nomic-embed-text
      "
    depends_on:
      - ollama
    restart: "no"

  backend:
    build:
      context: ./backend/LocalMind.Api
    ports:
      - "5201:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Data Source=/data/localmind.db
      Jwt__Key: ${JWT_KEY:?Set JWT_KEY in .env before running docker compose}
      Ollama__BaseUrl: http://ollama:11434
      Ollama__Model: qwen2.5-coder:7b
      Ollama__EmbeddingModel: nomic-embed-text
      Rag__StorageRoot: /rag
    volumes:
      - localmind-db:/data
      - ./rag:/rag
    depends_on:
      ollama-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  ollama-data:
  localmind-db: